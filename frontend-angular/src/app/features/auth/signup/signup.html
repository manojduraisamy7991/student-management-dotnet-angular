<div class="min-h-[80vh] flex items-center justify-center p-4">
  <mat-card class="w-full max-w-md p-2 !rounded-2xl shadow-2xl border border-gray-100 overflow-hidden relative">
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-purple-500 to-indigo-600"></div>
    
    <mat-card-header class="mb-4 flex flex-col items-center pt-6">
      <div class="w-16 h-16 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center mb-4">
        <mat-icon class="scale-150">person_add</mat-icon>
      </div>
      <mat-card-title class="!text-3xl font-extrabold text-gray-800">Create Account</mat-card-title>
      <mat-card-subtitle class="!text-gray-500 mt-2">Join to start managing students</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-3">
        
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="name" placeholder="John Doe" />
          <mat-icon matPrefix class="text-gray-400 mr-2">person</mat-icon>
          <mat-error *ngIf="signupForm.get('name')?.hasError('required')">Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="john@example.com" />
          <mat-icon matPrefix class="text-gray-400 mr-2">email</mat-icon>
          <mat-error *ngIf="signupForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="signupForm.get('email')?.hasError('email')">Invalid email format</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" placeholder="min. 6 characters" />
          <mat-icon matPrefix class="text-gray-400 mr-2">key</mat-icon>
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="signupForm.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="signupForm.get('password')?.hasError('minlength')">Minimum 6 characters</mat-error>
        </mat-form-field>

        <button mat-flat-button color="accent" type="submit" class="!py-6 mt-4 text-lg !rounded-xl shadow-lg hover:shadow-xl transition-all" [disabled]="signupForm.invalid || isLoading">
          <mat-spinner *ngIf="isLoading" diameter="24" class="mr-2"></mat-spinner>
          <span *ngIf="!isLoading">Create Account</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer class="text-center pb-6">
      <p class="text-gray-600 mt-4">
        Already have an account? 
        <a routerLink="/login" class="text-purple-600 font-bold hover:underline transition-all">Sign In</a>
      </p>
    </mat-card-footer>
  </mat-card>
</div>
