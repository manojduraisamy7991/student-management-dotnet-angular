<div class="min-h-[80vh] flex items-center justify-center p-4">
  <mat-card class="w-full max-w-md p-2 !rounded-2xl shadow-2xl border border-gray-100 overflow-hidden relative">
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
    
    <mat-card-header class="mb-6 flex flex-col items-center pt-6">
      <div class="w-16 h-16 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center mb-4">
        <mat-icon class="scale-150">lock</mat-icon>
      </div>
      <mat-card-title class="!text-3xl font-extrabold text-gray-800">Welcome Back</mat-card-title>
      <mat-card-subtitle class="!text-gray-500 mt-2">Sign in to manage your students</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="test@example.com" />
          <mat-icon matPrefix class="text-gray-400 mr-2">email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Invalid email format</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" placeholder="password" />
          <mat-icon matPrefix class="text-gray-400 mr-2">key</mat-icon>
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
        </mat-form-field>

        <div class="flex justify-between items-center text-sm mb-2">
          <a href="#" class="text-blue-600 hover:text-blue-800 font-medium transition-colors">Forgot password?</a>
        </div>

        <button mat-flat-button color="primary" type="submit" class="!py-6 text-lg !rounded-xl shadow-lg hover:shadow-xl transition-all" [disabled]="loginForm.invalid || isLoading">
          <mat-spinner *ngIf="isLoading" diameter="24" class="mr-2"></mat-spinner>
          <span *ngIf="!isLoading">Sign In</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer class="text-center pb-6">
      <p class="text-gray-600 mt-4">
        Don't have an account? 
        <a routerLink="/signup" class="text-blue-600 font-bold hover:underline transition-all">Sign Up</a>
      </p>
    </mat-card-footer>
  </mat-card>
</div>
